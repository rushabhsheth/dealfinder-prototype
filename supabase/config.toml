# Supabase project config (trimmed). Full reference:
# https://supabase.com/docs/guides/local-development/cli/config
# `project_id` is a local label; linking to the hosted project uses its ref id
# (supabase link --project-ref <ref>), not this value.
project_id = "dealfinder"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
# Where Supabase Auth sends users back; matches the app/ frontend in dev.
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
# Dev convenience: signup returns a session immediately. Turn ON for production
# so addresses are verified before an account is usable.
enable_confirmations = false
